services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"

  ai-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m uvicorn ai_gateway.main:app --host 0.0.0.0 --port 8100
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8100:8100"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
